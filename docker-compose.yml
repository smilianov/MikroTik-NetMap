services:
  netmap:
    build: .
    container_name: mikrotik-netmap
    restart: unless-stopped
    ports:
      - "${NETMAP_PORT:-8585}:8585"
    volumes:
      - "${NETMAP_CONFIG_FILE:-./config/netmap.yaml}:/app/config/netmap.yaml:ro"
    env_file:
      - .env
    environment:
      - NETMAP_CONFIG=/app/config/netmap.yaml
